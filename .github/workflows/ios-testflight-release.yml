name: iOS TestFlight Release

on:
  workflow_dispatch:

jobs:
  precheck-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
        run: |
          set -eo pipefail

          REQUIRED=(
            IOS_KEYCHAIN_PASSWORD
            IOS_CERTIFICATE_P12_BASE64
            IOS_CERTIFICATE_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
            IOS_TEAM_ID
            IOS_BUNDLE_IDENTIFIER
            APPLE_API_KEY_ID
            APPLE_API_ISSUER_ID
            APPLE_API_PRIVATE_KEY_BASE64
          )

          MISSING=()
          for SECRET_NAME in "${REQUIRED[@]}"; do
            if [ -z "${!SECRET_NAME}" ]; then
              MISSING+=("$SECRET_NAME")
            fi
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "Missing required GitHub repository secrets:" >&2
            printf ' - %s\n' "${MISSING[@]}" >&2
            exit 1
          fi

          echo "All required secrets are configured."

  release-testflight:
    needs: precheck-secrets
    runs-on: macos-14
    timeout-minutes: 40
    env:
      APP_NAME: GaussPrep
      WORKING_DIRECTORY: ios/GaussPrep

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Install XcodeGen 2.38.0
        run: |
          set -eo pipefail
          curl -L https://github.com/yonaskolb/XcodeGen/releases/download/2.38.0/xcodegen.zip -o xcodegen.zip
          unzip -o xcodegen.zip
          chmod +x ./bin/xcodegen
          sudo mv ./bin/xcodegen /usr/local/bin/xcodegen
          xcodegen --version

      - name: Remove any pre-generated project
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: rm -rf GaussPrep.xcodeproj

      - name: Generate Xcode project
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: xcodegen generate

      - name: Create temporary keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          set -eo pipefail
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychain -d user -s build.keychain login.keychain

      - name: Install signing certificate
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
        run: |
          set -eo pipefail
          echo "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -k "${{ secrets.IOS_KEYCHAIN_PASSWORD }}" build.keychain

      - name: Install provisioning profile
        id: install_profile
        env:
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -eo pipefail
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          security cms -D -i profile.mobileprovision > profile.plist
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' profile.plist)
          PROFILE_NAME=$(/usr/libexec/PlistBuddy -c 'Print Name' profile.plist)
          cp profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"
          echo "profile_uuid=$PROFILE_UUID" >> "$GITHUB_OUTPUT"
          echo "profile_name=$PROFILE_NAME" >> "$GITHUB_OUTPUT"

      - name: Prepare API key
        env:
          APPLE_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_API_PRIVATE_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          set -eo pipefail
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPLE_API_PRIVATE_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Build archive
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          set -eo pipefail
          xcodebuild \
            -project ${APP_NAME}.xcodeproj \
            -scheme ${APP_NAME} \
            -configuration Release \
            -archivePath build/${APP_NAME}.xcarchive \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_IDENTIFIER" \
            PROVISIONING_PROFILE_SPECIFIER="${{ steps.install_profile.outputs.profile_name }}" \
            OTHER_CODE_SIGN_FLAGS='--keychain build.keychain' \
            clean archive

      - name: Create export options
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          set -eo pipefail
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "https://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_IDENTIFIER}</key>
              <string>${{ steps.install_profile.outputs.profile_name }}</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          set -eo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath build/${APP_NAME}.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload to TestFlight
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        working-directory: ${{ env.WORKING_DIRECTORY }}
        run: |
          set -eo pipefail
          xcrun altool \
            --upload-app \
            --type ios \
            --file build/export/${APP_NAME}.ipa \
            --apiKey "$APPLE_API_KEY_ID" \
            --apiIssuer "$APPLE_API_ISSUER_ID"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaussprep-release-ipa
          path: ios/GaussPrep/build/export/GaussPrep.ipa
          if-no-files-found: error
