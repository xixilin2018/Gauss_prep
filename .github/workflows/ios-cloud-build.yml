name: iOS Cloud Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - ios/GaussPrep/**
      - .github/workflows/ios-cloud-build.yml
  pull_request:
    paths:
      - ios/GaussPrep/**
      - .github/workflows/ios-cloud-build.yml

jobs:
  build-ios-simulator:
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "15.4"

      - name: Install XcodeGen 2.38.0
        run: |
          set -eo pipefail
          rm -rf xcodegen xcodegen.zip
          curl -L https://github.com/yonaskolb/XcodeGen/releases/download/2.38.0/xcodegen.zip -o xcodegen.zip
          unzip -o xcodegen.zip
          XCODEGEN_BIN="$(find . -type f -path "*/xcodegen/bin/xcodegen" | head -n 1)"
          if [ -z "$XCODEGEN_BIN" ]; then
            echo "Could not locate xcodegen binary after unzip" >&2
            exit 1
          fi
          chmod +x "$XCODEGEN_BIN"
          sudo install -m 755 "$XCODEGEN_BIN" /usr/local/bin/xcodegen
          xcodegen --version

      - name: Remove any pre-generated project
        working-directory: ios/GaussPrep
        run: rm -rf GaussPrep.xcodeproj

      - name: Generate Xcode project
        working-directory: ios/GaussPrep
        run: xcodegen generate

      - name: Build for iPad simulator
        working-directory: ios/GaussPrep
        run: |
          set -eo pipefail
          xcodebuild \
            -project GaussPrep.xcodeproj \
            -scheme GaussPrep \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package simulator app
        working-directory: ios/GaussPrep
        run: |
          set -eo pipefail
          APP_PATH="$(find ~/Library/Developer/Xcode/DerivedData -type d -path "*Build/Products/Debug-iphonesimulator/GaussPrep.app" | head -n 1)"

          if [ -z "$APP_PATH" ]; then
            echo "GaussPrep.app not found in DerivedData"
            exit 1
          fi

          mkdir -p build-artifacts
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build-artifacts/GaussPrep-simulator.app.zip

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: gaussprep-simulator-app
          path: ios/GaussPrep/build-artifacts/GaussPrep-simulator.app.zip
          if-no-files-found: error
