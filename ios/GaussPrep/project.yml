name: GaussPrep
options:
  minimumXcodeGenVersion: 2.38.0
  xcodeVersion: "15.4"
settings:
  base:
    PRODUCT_BUNDLE_IDENTIFIER: com.gaussprep.app
    PRODUCT_NAME: GaussPrep
    SWIFT_VERSION: 5.0
    TARGETED_DEVICE_FAMILY: "2"
    IPHONEOS_DEPLOYMENT_TARGET: 16.0
    ALWAYS_SEARCH_USER_PATHS: NO
targets:
  GaussPrep:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: GaussPrepApp.swift
      - path: Models
      - path: Services
      - path: ViewModels
      - path: Views
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: Gauss Prep
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
schemes:
  GaussPrep:
    build:
      targets:
        GaussPrep: all
    run:
      config: Debug
    archive:
      config: Release
